<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abrir Coopertrans Móvil</title>
<!--
  Página de FALLBACK de los deep links (/app/ir/*). Solo se ve si el link se
  abre SIN la app instalada (o en una PC). Con la app instalada y los App
  Links / Universal Links verificados, el sistema operativo abre la app
  directamente y esta página nunca aparece.
-->
<style>
  :root {
    --primary: #1a3a8f;
    --text: #1f2937;
    --muted: #6b7280;
    --border: #e5e7eb;
    --bg: #f9fafb;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    line-height: 1.6; color: var(--text); background: var(--bg);
    margin: 0; display: flex; min-height: 100vh; align-items: center;
    justify-content: center; padding: 24px;
  }
  .card {
    background: #fff; border: 1px solid var(--border); border-radius: 16px;
    max-width: 420px; width: 100%; padding: 32px 28px; text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  h1 { font-size: 1.4rem; margin: 0 0 8px; color: var(--primary); }
  p { color: var(--muted); margin: 0 0 24px; }
  .btn {
    display: block; width: 100%; padding: 14px; border-radius: 10px;
    background: var(--primary); color: #fff; text-decoration: none;
    font-weight: 600; margin-bottom: 12px;
  }
  .btn.secundario { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
  .nota { font-size: 0.85rem; color: var(--muted); margin-top: 16px; }
</style>
</head>
<body>
  <div class="card">
    <h1>Coopertrans Móvil</h1>
    <p>Abrí este enlace desde tu celular con la app instalada para ir directo a la pantalla.</p>
    <a class="btn" href="https://play.google.com/store/apps/details?id=com.coopertrans.movil">Descargar para Android</a>
    <a class="btn secundario" href="https://cooper-trans.com.ar/app">Más opciones de descarga</a>
    <p class="nota">En iPhone, buscá <strong>"Coopertrans Móvil"</strong> en el App Store.</p>
  </div>
</body>
</html>
