# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

analyzer:
  # Excluimos del análisis código que no es nuestro:
  #   - node_modules/: dependencias Node de firebase-tools / whatsapp-bot.
  #     Algunas traen archivos Dart de templates que no compilan acá
  #     y no deberían ser analizados.
  #   - functions/: las Cloud Functions son TypeScript, no Dart.
  #   - whatsapp-bot/: el bot es Node.js puro, no tiene Dart.
  #   - build/: salida del compilador.
  exclude:
    - "**/node_modules/**"
    - "node_modules/**"
    - "functions/**"
    - "whatsapp-bot/**"
    - "build/**"
    - "**/.dart_tool/**"
    # refactor/: kit del rebrand design-system pendiente de aplicar
    # (TASK.md en G:/Drive). Es código no integrado al codebase activo
    # — referencia clases (PrefsService, AppCollections, AppRoutes)
    # que existen en lib/ pero el refactor/ no las importa. Hasta que
    # se haga el merge oficial via TASK.md fases 1-8, queda excluido.
    - "refactor/**"
    # design_polish/: pack de follow-ups del design-review (login,
    # avatar initials, AppOfflineBanner, AppSkeleton). Los archivos se
    # copian uno por uno a lib/ vía Phases A-D. Mientras tanto los
    # originales están sueltos sin imports resueltos — no integran.
    - "design_polish/**"

linter:
  # Lints adicionales habilitados (2026-04-28) sobre la base de
  # flutter_lints. La razón está al lado de cada uno.
  rules:
    # Detecta usos de BuildContext después de un await sin chequear
    # mounted — la causa habitual de los crashes "setState() called
    # after dispose()".
    use_build_context_synchronously: true

    # Evita print() en producción (debugPrint sí está permitido).
    avoid_print: true

    # Constructores const cuando sea posible — mejora el rendimiento
    # de rebuilds y reduce allocations.
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true

    # Para evitar accidentalmente devolver Future no esperado en lugar
    # del valor.
    unawaited_futures: true

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
