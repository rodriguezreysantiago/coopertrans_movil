# Configuracion de iconos de launcher (Android + iOS + macOS).
# Para regenerar despues de cambiar la imagen fuente:
#   flutter pub get
#   dart run flutter_launcher_icons
# El icono de Windows se genera aparte (ver scripts) porque .ico
# multi-resolucion no esta cubierto por este package.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/playstore/icon-VAVG-1024.png"
  macos:
    generate: true
    image_path: "assets/playstore/icon-VAVG-1024.png"
  min_sdk_android: 24
  remove_alpha_ios: true
  background_color_ios: "#E8EAED"
  adaptive_icon_background: "#E8EAED"
  adaptive_icon_foreground: "assets/playstore/icon-VAVG-1024.png"

flutter:
  uses-material-design: true
  assets:
    - assets/gomeria/
    - assets/brand/
    - assets/fonts/

  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Regular.ttf
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Geist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Geist-Bold.ttf
          weight: 700
    - family: GeistMono
      fonts:
        - asset: assets/fonts/GeistMono-Regular.ttf
        - asset: assets/fonts/GeistMono-Medium.ttf
          weight: 500
