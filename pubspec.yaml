    generate: true
    image_path: "assets/playstore/icon-VAVG-1024.png"
  min_sdk_android: 24
  remove_alpha_ios: true
  background_color_ios: "#E8EAED"
  adaptive_icon_background: "#E8EAED"
  adaptive_icon_foreground: "assets/playstore/icon-VAVG-1024.png"

