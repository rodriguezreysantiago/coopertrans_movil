# Configuracion de iconos de launcher (Android + iOS + macOS).
# Para regenerar despues de cambiar la imagen fuente:
#   flutter pub get
#   dart run flutter_launcher_icons
# El icono de Windows se genera aparte (ver scripts) porque .ico
# multi-resolucion no esta cubierto por este package.
flutter_launcher_icons:
