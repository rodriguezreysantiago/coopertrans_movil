<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    
    <radialGradient id="bg" cx="50%" cy="48%" r="72%">
      <stop offset="0%" stop-color="#1c1750"></stop>
      <stop offset="55%" stop-color="#0c0930"></stop>
      <stop offset="100%" stop-color="#04031a"></stop>
    </radialGradient>

    
    <radialGradient id="glowPurple" cx="22%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.28"></stop>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.06"></stop>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"></stop>
    </radialGradient>

    
    <radialGradient id="glowBlue" cx="80%" cy="82%" r="55%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.22"></stop>
      <stop offset="60%" stop-color="#2563eb" stop-opacity="0.05"></stop>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"></stop>
    </radialGradient>

    
    <linearGradient id="cBody" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#e9defb"></stop>
      <stop offset="35%" stop-color="#c7b6ff"></stop>
      <stop offset="70%" stop-color="#8b7cff"></stop>
      <stop offset="100%" stop-color="#5b5bff"></stop>
    </linearGradient>

    
    <linearGradient id="cHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"></stop>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.15"></stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>

    
    <linearGradient id="neonEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef"></stop>
      <stop offset="50%" stop-color="#a855f7"></stop>
      <stop offset="100%" stop-color="#3b82f6"></stop>
    </linearGradient>

    
    <linearGradient id="ringGrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#e879f9"></stop>
      <stop offset="35%" stop-color="#a855f7"></stop>
      <stop offset="70%" stop-color="#6366f1"></stop>
      <stop offset="100%" stop-color="#22d3ee"></stop>
    </linearGradient>

    
    <radialGradient id="eyeGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e0fbff"></stop>
      <stop offset="45%" stop-color="#7dd3fc"></stop>
      <stop offset="100%" stop-color="#38bdf8"></stop>
    </radialGradient>

    
    <filter id="ringGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="b1"></feGaussianBlur>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b2"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b2"></feMergeNode>
        <feMergeNode in="b1"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <filter id="cGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="bigBlur"></feGaussianBlur>
      <feColorMatrix in="bigBlur" type="matrix" values="0.7 0 0 0 0&#xA;                0 0.4 0 0 0&#xA;                0 0 1.2 0 0.05&#xA;                0 0 0 1 0"></feColorMatrix>
    </filter>

    <filter id="eyeBloom" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="22" result="b1"></feGaussianBlur>
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="b2"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b1"></feMergeNode>
        <feMergeNode in="b1"></feMergeNode>
        <feMergeNode in="b2"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"></stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"></stop>
    </radialGradient>
  </defs>

  
  <rect width="1024" height="1024" fill="url(#bg)"></rect>
  <rect width="1024" height="1024" fill="url(#glowPurple)"></rect>
  <rect width="1024" height="1024" fill="url(#glowBlue)"></rect>

  <g transform="translate(512 512)">
    
    <circle cx="-10" cy="20" r="280" fill="#7c3aed" opacity="0.18" filter="url(#cGlow)"></circle>

    
    <g filter="url(#ringGlow)">
      <circle cx="0" cy="0" r="468" fill="none" stroke="url(#ringGrad)" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="640 14 1500 22 740 22" stroke-dashoffset="120" opacity="0.95"></circle>
    </g>

    
    <path d="M 248 -212 A 320 320 0 1 0 248 212" fill="none" stroke="url(#neonEdge)" stroke-width="180" stroke-linecap="round" opacity="0.55" filter="url(#cGlow)"></path>

    
    <path d="M 248 -212 A 320 320 0 1 0 248 212" fill="none" stroke="url(#cBody)" stroke-width="148" stroke-linecap="round"></path>

    
    <path d="M 248 -212 A 320 320 0 0 0 -302 -106" fill="none" stroke="url(#cHighlight)" stroke-width="140" stroke-linecap="round" opacity="0.55"></path>

    
    <path d="M 248 -212 A 320 320 0 1 0 248 212" fill="none" stroke="#c4b5fd" stroke-width="148" stroke-linecap="round" opacity="0"></path>

    
    <g filter="url(#eyeBloom)">
      <rect x="-72" y="-58" width="44" height="116" rx="22" fill="url(#eyeGrad)"></rect>
      <rect x="28" y="-58" width="44" height="116" rx="22" fill="url(#eyeGrad)"></rect>
    </g>
    
    <rect x="-72" y="-58" width="44" height="116" rx="22" fill="url(#eyeGrad)"></rect>
    <rect x="28" y="-58" width="44" height="116" rx="22" fill="url(#eyeGrad)"></rect>
    
    <rect x="-64" y="-50" width="12" height="38" rx="6" fill="#ffffff" opacity="0.55"></rect>
    <rect x="36" y="-50" width="12" height="38" rx="6" fill="#ffffff" opacity="0.55"></rect>
  </g>

  
  <rect width="1024" height="1024" fill="url(#vignette)"></rect>
</svg>