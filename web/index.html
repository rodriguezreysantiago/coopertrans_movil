<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sistema de gestión de flota y logística — Coopertrans Móvil (VAVG).">
  <meta name="theme-color" content="#04031A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Coopertrans Móvil">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

  <!-- Favicon — set Núcleo (monograma C). Rutas relativas por el base href. -->
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">

  <title>Coopertrans Móvil — Sistema de gestión</title>
  <link rel="manifest" href="site.webmanifest">

  <!-- Fondo near-black Núcleo durante la carga (evita el flash blanco antes
       de que CanvasKit renderice la pantalla de login). Matchea el splash de
       la app: near-black + glow indigo sutil arriba. -->
  <style>
    html, body { margin: 0; padding: 0; background-color: #050505; }
    #cargando {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      color: rgba(250, 250, 250, 0.55);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
      background: radial-gradient(60% 50% at 50% 32%, rgba(124, 131, 255, 0.14), transparent 70%), #050505;
    }
  </style>
</head>
<body>
  <div id="cargando">Cargando Coopertrans Móvil…</div>
  <script>
    // Saca la pantalla de carga cobalto cuando Flutter pinta el primer frame.
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('cargando');
      if (el) el.remove();
    });
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
